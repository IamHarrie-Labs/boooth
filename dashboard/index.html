<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Boooth — Live on BOT Chain</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<style>
  body { background:#0b0d12; color:#e6e9ef; font-family: ui-monospace, Menlo, Consolas, monospace; margin:0; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:#8892a6; font-size:13px; margin-bottom:20px; }
  .stats { display:flex; gap:16px; margin-bottom:20px; }
  .card { background:#141822; border:1px solid #232838; border-radius:10px; padding:14px 18px; min-width:160px; }
  .card .label { color:#8892a6; font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
  .card .value { font-size:22px; margin-top:4px; color:#7ee787; }
  #log { list-style:none; margin:0; padding:0; }
  #log li { border-bottom:1px solid #1c202b; padding:10px 4px; font-size:13px; opacity:0; animation: fadein .3s forwards; }
  #log li .tag { color:#79c0ff; margin-right:8px; }
  #log li .amt { color:#7ee787; }
  #log li .time { color:#565f75; float:right; }
  @keyframes fadein { to { opacity:1; } }
  input { background:#141822; border:1px solid #232838; color:#e6e9ef; padding:6px 10px; border-radius:6px; width:420px; }
  #config { margin-bottom:16px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  button { background:#238636; border:none; color:white; padding:6px 14px; border-radius:6px; cursor:pointer; }
</style>
</head>
<body>
  <h1>Boooth</h1>
  <div class="sub">Autonomous agent paying + logging on-chain, live from BOT Chain testnet (chain 968)</div>

  <div id="config">
    <input id="payPerCallAddr" placeholder="PayPerCall contract address" />
    <button onclick="start()">Connect</button>
    <span id="status" style="color:#8892a6;font-size:12px;"></span>
  </div>

  <div class="stats">
    <div class="card"><div class="label">Payments</div><div class="value" id="paymentCount">0</div></div>
    <div class="card"><div class="label">Total Paid (BOT)</div><div class="value" id="totalPaid">0</div></div>
    <div class="card"><div class="label">Latest Block</div><div class="value" id="latestBlock">-</div></div>
  </div>

  <ul id="log"></ul>

<script>
const RPC_URL = "https://rpc.bohr.life";
const PAYPERCALL_ABI = [
  "event CallPaid(uint256 indexed providerId, address indexed payer, address indexed payoutAddress, uint256 amount, uint256 timestamp)",
  "event StepLogged(address indexed agent, uint256 indexed taskId, uint256 stepIndex, uint256 indexed providerId, string summary, bytes32 dataHash, uint256 timestamp)"
];

let paymentCount = 0;
let totalPaid = 0n;

function prependLog(html) {
  const li = document.createElement("li");
  li.innerHTML = html;
  document.getElementById("log").prepend(li);
}

async function start() {
  const addr = document.getElementById("payPerCallAddr").value.trim();
  if (!addr) { alert("Paste the PayPerCall contract address"); return; }

  const provider = new ethers.JsonRpcProvider(RPC_URL);
  const contract = new ethers.Contract(addr, PAYPERCALL_ABI, provider);
  document.getElementById("status").textContent = "connected, listening...";

  contract.on("CallPaid", (providerId, payer, payoutAddress, amount, timestamp) => {
    paymentCount += 1;
    totalPaid += amount;
    document.getElementById("paymentCount").textContent = paymentCount;
    document.getElementById("totalPaid").textContent = ethers.formatEther(totalPaid);
    prependLog(
      `<span class="tag">PAID</span> provider #${providerId} <span class="amt">${ethers.formatEther(amount)} BOT</span>` +
      ` &rarr; ${payoutAddress.slice(0,6)}...${payoutAddress.slice(-4)}` +
      `<span class="time">${new Date(Number(timestamp)*1000).toLocaleTimeString()}</span>`
    );
  });

  contract.on("StepLogged", (agent, taskId, stepIndex, providerId, summary) => {
    prependLog(
      `<span class="tag">STEP</span> task ${taskId} #${stepIndex} — ${summary}` +
      `<span class="time">agent ${agent.slice(0,6)}...${agent.slice(-4)}</span>`
    );
  });

  provider.on("block", (blockNumber) => {
    document.getElementById("latestBlock").textContent = blockNumber;
  });
}
</script>
</body>
</html>
